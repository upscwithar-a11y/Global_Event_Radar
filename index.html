<!DOCTYPE html>
<html>
<head>

<title>Global Events Radar</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
text-align:center;
}

#map{
height:500px;
width:100%;
}

</style>

</head>

<body>

<h1>🌍 Global Events Radar</h1>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([20,0],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);


fetch("https://gnews.io/api/v4/top-headlines?lang=en&apikey=a4efbcc311fae17f19cdeb469cea9a03")

.then(response => response.json())

.then(data => {

data.articles.forEach(article => {

var lat = (Math.random()*140)-70;
var lng = (Math.random()*360)-180;

var marker = L.marker([lat,lng]).addTo(map);

marker.bindPopup(
"<b>"+article.title+"</b><br>"+article.source.name
);

});

});

</script>

</body>

</html>
