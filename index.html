<!DOCTYPE html>
<html>

<head>

<title>AI Global Intelligence Radar</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#050505;
color:white;
}

header{
background:#000;
padding:10px;
text-align:center;
}

#search{
width:60%;
padding:8px;
margin-top:5px;
}

#stats{
margin-top:5px;
}

#map{
height:60vh;
}

#panel{
height:40vh;
overflow:auto;
background:#111;
padding:10px;
}

.event{
background:#222;
padding:10px;
margin-bottom:8px;
border-radius:6px;
}

</style>

</head>

<body>

<header>

<h2>🌍 AI Global Intelligence Radar</h2>

<input id="search" placeholder="Search global events">

<div id="stats">
Events Loaded: <span id="count">0</span>
</div>

</header>

<div id="map"></div>

<div id="panel"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([20,0],2);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

var eventCount=0;

function detectType(title){

title=title.toLowerCase();

if(title.includes("war")||title.includes("attack")) return "conflict";
if(title.includes("earthquake")) return "earthquake";
if(title.includes("fire")||title.includes("wildfire")) return "fire";
if(title.includes("ai")||title.includes("technology")) return "tech";

return "news";

}

function getColor(type){

if(type==="conflict") return "red";
if(type==="earthquake") return "orange";
if(type==="fire") return "yellow";
if(type==="tech") return "green";

return "white";

}

function summarize(text){

if(!text) return "";

if(text.length>100)
return text.substring(0,100)+"...";

return text;

}

function addEvent(title,lat,lng,type,url){

eventCount++;

document.getElementById("count").innerText=eventCount;

var marker=L.circleMarker([lat,lng],{
color:getColor(type),
radius:8
}).addTo(map);

marker.bindPopup("<b>"+title+"</b>");

var html=`
<div class="event">
<b>${title}</b><br>
${type}<br>
<a href="${url}" target="_blank">Read</a>
</div>
`;

document.getElementById("panel").innerHTML+=html;

}

function loadNews(){

fetch("https://gnews.io/api/v4/top-headlines?lang=en&max=20&apikey=news api
a4efbcc311fae17f19cdeb469cea9a03")

.then(res=>res.json())

.then(data=>{

data.articles.forEach(article=>{

var type=detectType(article.title);

var lat=(Math.random()*140)-70;
var lng=(Math.random()*360)-180;

var summary=summarize(article.description||article.title);

addEvent(summary,lat,lng,type,article.url);

});

});

}

function loadEarthquakes(){

fetch("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson")

.then(res=>res.json())

.then(data=>{

data.features.forEach(eq=>{

var title=eq.properties.place;

var lat=eq.geometry.coordinates[1];
var lng=eq.geometry.coordinates[0];

addEvent(title,lat,lng,"earthquake","#");

});

});

}

loadNews();

loadEarthquakes();

setInterval(loadNews,600000);

document.getElementById("search").addEventListener("input",function(){

var q=this.value.toLowerCase();

var items=document.querySelectorAll(".event");

items.forEach(function(item){

if(item.innerText.toLowerCase().includes(q))
item.style.display="block";
else
item.style.display="none";

});

});

</script>

</body>

</html>
