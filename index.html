<!DOCTYPE html>
<html>

<head>

<title>Global Events Radar</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:0;
}

#map{
height:70vh;
}

#events{
height:30vh;
overflow:auto;
padding:10px;
background:#f2f2f2;
}

.event{
margin-bottom:10px;
padding:10px;
background:white;
border-radius:6px;
}

</style>

</head>

<body>

<h2 style="text-align:center">🌍 Global Events Radar</h2>

<div id="map"></div>

<div id="events"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([20,0],2);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{ attribution:'© OpenStreetMap'}
).addTo(map);

function categorize(title){

title = title.toLowerCase();

if(title.includes("war") || title.includes("attack")) return "conflict";
if(title.includes("earthquake") || title.includes("flood")) return "disaster";
if(title.includes("election") || title.includes("government")) return "politics";
if(title.includes("ai") || title.includes("technology")) return "tech";

return "general";
}

function getColor(type){

if(type==="conflict") return "red";
if(type==="disaster") return "orange";
if(type==="politics") return "blue";
if(type==="tech") return "green";

return "gray";
}

fetch("https://gnews.io/api/v4/top-headlines?lang=en&max=20&apikey=a4efbcc311fae17f19cdeb469cea9a03")

.then(res=>res.json())

.then(data=>{

data.articles.forEach(article=>{

var type = categorize(article.title);

var lat = (Math.random()*140)-70;
var lng = (Math.random()*360)-180;

var marker = L.circleMarker([lat,lng],{
color:getColor(type),
radius:8
}).addTo(map);

marker.bindPopup(
"<b>"+article.title+"</b><br>"+article.source.name
);

var eventHTML = `
<div class="event">
<b>${article.title}</b><br>
${type}<br>
<a href="${article.url}" target="_blank">Read</a>
</div>
`;

document.getElementById("events").innerHTML += eventHTML;

});

});

</script>

</body>

</html>
